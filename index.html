<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog Pro // Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --glass: rgba(255, 255, 255, 0.88);
            --text: #111827;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: var(--text); min-height: 100vh; margin: 0; padding: 20px;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🚀 NEW: Professional Header Stats */
        .header-box {
            max-width: 1000px; margin: 20px auto 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.2); padding: 20px 30px;
            border-radius: 20px; color: white; backdrop-filter: blur(10px);
        }
        .stats-group { display: flex; gap: 30px; }
        .stat-item { text-align: center; }
        .stat-value { font-weight: 800; font-size: 1.2rem; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }

        /* Modern Input Container */
        .form-container { 
            max-width: 650px; margin: 0 auto 50px; 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .form-container h2 { margin-top: 0; font-weight: 800; color: var(--primary); }

        input, textarea { 
            width: 100%; padding: 16px; margin-bottom: 20px; border-radius: 12px; 
            border: 1px solid rgba(0,0,0,0.05); box-sizing: border-box; 
            font-family: inherit; font-size: 1rem; background: #f9fafb;
            transition: all 0.3s;
        }
        input:focus, textarea:focus { 
            outline: none; background: white; border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .submit-btn { 
            background: var(--primary); color: white; border: none; 
            padding: 16px; border-radius: 12px; cursor: pointer; 
            font-weight: 700; width: 100%; font-size: 1.1rem; transition: 0.3s;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        /* Search Bar Area */
        .search-area { max-width: 1200px; margin: 0 auto 30px; display: flex; justify-content: flex-end; }
        #search { 
            max-width: 300px; background: var(--glass); border: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Grid & Cards */
        #log-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto 100px; }
        .card { 
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.3s ease;
        }
        .card:hover { transform: scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card h3 { margin: 0; color: #111; font-weight: 700; }
        .delete-btn { background: #fee2e2; color: #ef4444; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 600; }
        
        .markdown-body { margin-top: 15px; font-size: 0.95rem; color: #374151; line-height: 1.6; }
        .markdown-body pre { background: #111827; color: #e5e7eb; padding: 15px; border-radius: 12px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="header-box">
    <div>
        <h1 style="margin:0; font-size: 1.8rem;">DevLog 🚀</h1>
        <span style="opacity: 0.7; font-size: 0.9rem;">Welcome back, Developer</span>
    </div>
    <div class="stats-group">
        <div class="stat-item">
            <span class="stat-value" id="total-logs">0</span>
            <span class="stat-label">Total Logs</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="avg-diff">0</span>
            <span class="stat-label">Avg. Level</span>
        </div>
    </div>
</div>

<div class="form-container">
    <h2>Add New Entry</h2>
    <input type="text" id="project" placeholder="Project Name" required>
    <input type="number" id="difficulty" placeholder="Difficulty Level (1-5)" min="1" max="5">
    <textarea id="content" rows="4" placeholder="What did you build today? (Markdown supported)"></textarea>
    <button class="submit-btn" onclick="saveLog()">Save to Dashboard</button>
</div>

<div class="search-area">
    <input type="text" id="search" placeholder="🔍 Filter your logs..." oninput="filterLogs()">
</div>

<div id="log-grid"></div>

<script>
    async function fetchLogs() {
        const res = await fetch('/api/logs');
        const logs = await res.json();
        
        // Update Stats
        document.getElementById('total-logs').innerText = logs.length;
        const avg = logs.length ? (logs.reduce((s, l) => s + Number(l.difficulty), 0) / logs.length).toFixed(1) : 0;
        document.getElementById('avg-diff').innerText = avg;

        const grid = document.getElementById('log-grid');
        grid.innerHTML = '';
        
        logs.forEach(log => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="card-header">
                    <h3>${log.project}</h3>
                    <button class="delete-btn" onclick="deleteLog('${log.id}')">Delete</button>
                </div>
                <div style="margin-top:5px">${'⭐'.repeat(log.difficulty)}</div>
                <div class="markdown-body">${marked.parse(log.content)}</div>
            `;
            grid.appendChild(div);
        });
    }

    async function saveLog() {
        const p = document.getElementById('project');
        const d = document.getElementById('difficulty');
        const c = document.getElementById('content');
        if(!p.value || !c.value) return alert("Fill required fields!");

        const data = { project: p.value, difficulty: d.value || 1, content: c.value, id: Date.now().toString() };
        await fetch('/api/logs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        
        p.value = ''; d.value = ''; c.value = '';
        fetchLogs();
    }

    async function deleteLog(id) {
        if(confirm("Delete this log?")) {
            await fetch(`/api/logs/${id}`, { method: 'DELETE' });
            fetchLogs();
        }
    }

    function filterLogs() {
        const term = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(term) ? 'block' : 'none';
        });
    }

    fetchLogs();
</script>
</body>
</html>
